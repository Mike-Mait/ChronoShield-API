name: Check IANA Timezone Database Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check-tz-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check for IANA timezone database updates
        id: tz-check
        run: |
          # Get the IANA tz version bundled in this Node.js
          CURRENT_TZ=$(node -e "console.log(process.versions.tz || 'unknown')")
          echo "current_tz=$CURRENT_TZ" >> $GITHUB_OUTPUT
          echo "Current Node.js IANA tz version: $CURRENT_TZ"

          # Fetch the latest IANA tz release from the official source
          LATEST_TZ=$(curl -sf "https://data.iana.org/time-zones/tzdb/version" | tr -d '[:space:]')
          echo "latest_tz=$LATEST_TZ" >> $GITHUB_OUTPUT
          echo "Latest IANA tz release: $LATEST_TZ"

          # Compare
          if [ "$CURRENT_TZ" = "$LATEST_TZ" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "Timezone data is up to date."
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "Timezone data is BEHIND. Current: $CURRENT_TZ, Latest: $LATEST_TZ"
          fi

      - name: Create or update issue if behind
        if: steps.tz-check.outputs.up_to_date == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.tz-check.outputs.current_tz }}';
            const latest = '${{ steps.tz-check.outputs.latest_tz }}';
            const title = `IANA Timezone Database update available: ${latest}`;

            // Check if an open issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tz-update',
            });

            const existing = issues.find(i => i.title.startsWith('IANA Timezone Database update available'));
            if (existing) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Weekly check: latest IANA tz version is **${latest}**, ChronoShield API is running **${current}**.\n\nTo update, upgrade the Node.js version in your Docker/Railway deployment.`,
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['tz-update'],
                body: [
                  `## IANA Timezone Database Update Available`,
                  ``,
                  `| | Version |`,
                  `|---|---|`,
                  `| **Current (in Node.js)** | \`${current}\` |`,
                  `| **Latest (from IANA)** | \`${latest}\` |`,
                  ``,
                  `### What this means`,
                  `A newer version of the IANA timezone database has been published. This may include:`,
                  `- Countries changing their DST rules`,
                  `- New timezone identifiers`,
                  `- Corrections to historical timezone data`,
                  ``,
                  `### How to update`,
                  `1. **Check if a newer Node.js version** includes \`${latest}\`: https://nodejs.org/en/download`,
                  `2. **Update the Node.js version** in your Dockerfile or Railway build settings`,
                  `3. **Redeploy** — the updated IANA data is bundled with Node.js via ICU`,
                  `4. **Verify** by checking \`/status\` → \`timezone_data.iana_version\``,
                  ``,
                  `> If Node.js hasn't shipped a release with \`${latest}\` yet, you can wait — Node.js typically picks up IANA updates within a few weeks.`,
                  ``,
                  `_This issue was created automatically by the weekly tz-update-check workflow._`,
                ].join('\n'),
              });
              console.log('Created new tz-update issue');
            }

      - name: Summary
        run: |
          echo "### Timezone Data Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Current (Node.js) | \`${{ steps.tz-check.outputs.current_tz }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest (IANA) | \`${{ steps.tz-check.outputs.latest_tz }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Up to date | ${{ steps.tz-check.outputs.up_to_date }} |" >> $GITHUB_STEP_SUMMARY
